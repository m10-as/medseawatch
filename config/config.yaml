project:
  name: medseawatch
  title: "MedSeaWatch: Marine Risk & Anomaly Intelligence"

region:
  name: "Barcelona-Tarragona / Catalan Coast"
  crs: "EPSG:4326"
  longitude_min: 0.75
  longitude_max: 3.10
  latitude_min: 40.45
  latitude_max: 41.95
  purpose: "CMEMS subset box for V1 discovery and ingestion"
  reference_points:
    barcelona_nearshore:
      longitude: 2.25
      latitude: 41.30
      role: "Initial CMEMS nearshore reference point; not a verified buoy"
    tarragona_nearshore:
      longitude: 1.35
      latitude: 41.05
      role: "Backup CMEMS nearshore reference point; not a verified buoy"
  validation_candidates:
    primary:
      name: "Boya de Barcelona II"
      provider: "Puertos del Estado / Portus"
      station_id: 1731
      longitude: 2.20
      latitude: 41.32
      depth_m: 68.0
      cadence_minutes: 60
      first_record: "2004-03-08 00:00:00.000"
      variables:
        - WAVE
        - WATER_TEMP
      status: "metadata_and_latest_wave_data_verified"
    backup:
      name: "Boya de Tarragona"
      provider: "Puertos del Estado / Portus"
      station_id: 1712
      longitude: 1.19
      latitude: 41.07
      depth_m: 15.0
      cadence_minutes: 60
      first_record: "1992-11-12 00:00:00.000"
      variables:
        - WAVE
      status: "metadata_and_latest_wave_data_verified"
    additional:
      - name: "Boya de Tarragona offshore"
        provider: "Puertos del Estado / Portus"
        station_id: 2720
        longitude: 1.47
        latitude: 40.69
        depth_m: 688.0
        cadence_minutes: 60
        first_record: "2004-08-20 14:00:00.000"
        variables:
          - WAVE
        status: "metadata_and_latest_wave_data_verified"

data_sources:
  copernicus_marine:
    wave_product: "MEDSEA_ANALYSISFORECAST_WAV_006_017"
    wave_dataset_hourly: "cmems_mod_med_wav_anfc_4.2km_PT1H-i"
    physics_product: "MEDSEA_ANALYSISFORECAST_PHY_006_013"
    sst_dataset_hourly: "cmems_mod_med_phy-tem_anfc_4.2km-2D_PT1H-m"
    salinity_dataset_hourly: "cmems_mod_med_phy-sal_anfc_4.2km-2D_PT1H-m"
    currents_dataset_hourly: "cmems_mod_med_phy-cur_anfc_4.2km-2D_PT1H-m"
    biogeochemistry_product: "MEDSEA_ANALYSISFORECAST_BGC_006_014"
    chlorophyll_dataset_daily: "cmems_mod_med_bgc-pft_anfc_4.2km_P1D-m"
    selected_variables:
      wave:
        - VHM0
        - VTPK
        - VMDR
      physics:
        - thetao
        - so
        - uo
        - vo
      biogeochemistry:
        - chl
  puertos_del_estado:
    api_base_url: "https://portus.puertos.es/portussvr/api"
    wave_station_metadata_rt: "estaciones/rt/WAVE"
    wave_station_metadata_hist: "estaciones/hist/WAVE"
    station_variables: "estaciones/variables/{station_id}"
    wave_parameters: "parametros/{station_id}"
    latest_wave_data: "lastData/station/{station_id}"
    historical_data_request: "solicitudDatos/registraSolicitud"
    status: "metadata_latest_data_verified_historical_request_flow_identified"
  aemet:
    status: "api_key_required"

paths:
  raw_data: "data/raw"
  interim_data: "data/interim"
  processed_data: "data/processed"
  models: "models"
  figures: "reports/figures"
