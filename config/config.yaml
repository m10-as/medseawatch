project:
  name: medseawatch
  title: "MedSeaWatch: Marine Risk & Anomaly Intelligence"

region:
  name: "Barcelona-Tarragona / Catalan Coast"
  crs: "EPSG:4326"
  longitude_min: 0.75
  longitude_max: 3.10
  latitude_min: 40.45
  latitude_max: 41.95
  purpose: "CMEMS subset box for V1 discovery and ingestion"
  reference_points:
    barcelona_nearshore:
      longitude: 2.25
      latitude: 41.30
      role: "Initial CMEMS nearshore reference point; not a verified buoy"
    tarragona_nearshore:
      longitude: 1.35
      latitude: 41.05
      role: "Backup CMEMS nearshore reference point; not a verified buoy"
  validation_candidates:
    primary:
      name: "Barcelona buoy area"
      provider: "Puertos del Estado / Portus"
      station_id: null
      longitude: null
      latitude: null
      status: "verify_in_section_3"
    backup:
      name: "Tarragona buoy area"
      provider: "Puertos del Estado / Portus"
      station_id: null
      longitude: null
      latitude: null
      status: "verify_in_section_3"

data_sources:
  copernicus_marine:
    wave_product: "MEDSEA_ANALYSISFORECAST_WAV_006_017"
    wave_dataset_hourly: "cmems_mod_med_wav_anfc_4.2km_PT1H-i"
    physics_product: "MEDSEA_ANALYSISFORECAST_PHY_006_013"
    sst_dataset_hourly: "cmems_mod_med_phy-tem_anfc_4.2km-2D_PT1H-m"
    salinity_dataset_hourly: "cmems_mod_med_phy-sal_anfc_4.2km-2D_PT1H-m"
    currents_dataset_hourly: "cmems_mod_med_phy-cur_anfc_4.2km-2D_PT1H-m"
    biogeochemistry_product: "MEDSEA_ANALYSISFORECAST_BGC_006_014"
    chlorophyll_dataset_daily: "cmems_mod_med_bgc-pft_anfc_4.2km_P1D-m"
    selected_variables:
      wave:
        - VHM0
        - VTPK
        - VMDR
      physics:
        - thetao
        - so
        - uo
        - vo
      biogeochemistry:
        - chl
  puertos_del_estado:
    status: "verify_access"
  aemet:
    status: "api_key_required"

paths:
  raw_data: "data/raw"
  interim_data: "data/interim"
  processed_data: "data/processed"
  models: "models"
  figures: "reports/figures"
